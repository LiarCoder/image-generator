# Merge / push to main → test + lint → publish to npm (only if package.json version is new on registry).
#
# Publishing uses npm Trusted Publishing (OIDC) — no long-lived NPM_TOKEN in GitHub Secrets.
# Docs: https://docs.npmjs.com/trusted-publishers
#
# One-time setup on npmjs.com (per package):
# 1. Open the package → Settings → Trusted publishing → GitHub Actions.
# 2. Fill Organization/user, Repository, and Workflow filename exactly: publish-npm.yml
#    (filename only, case-sensitive, must exist under .github/workflows/).
# 3. Save. Ensure package.json "repository.url" matches this GitHub repo URL exactly.
#
# Requirements (per npm): Node ≥ 22.14, npm CLI ≥ 11.5.1 — use Node 24 on the runner.

name: Publish npm

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC → npm trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No registry-url: avoids deprecated always-auth in .npmrc; default registry is npmjs.org.
      # Trusted publishing (OIDC) does not use NODE_AUTH_TOKEN.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - name: Skip publish if this version already exists on npm
        id: version
        run: |
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          if npm view "${NAME}@${VER}" version >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VER} is already published; skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Version ${VER} not on registry; will publish."
          fi

      - name: Publish to npm (OIDC)
        if: steps.version.outputs.skip == 'false'
        run: npm publish --access public
